{% extends 'base.html' %}

{% block content %}
<h2>Transfer Asset: {{ asset.asset_name }}</h2>

<form method="POST" class="mt-3" style="max-width: 500px;">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Asset ID</label>
        <input type="text" class="form-control" value="{{ asset.asset_id }}" disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">Asset Name</label>
        <input type="text" class="form-control" value="{{ asset.asset_name }}" disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">Assign To (new owner)</label>
        <select name="assigned_to" class="form-select" required>
            {% for u in users %}
            <option value="{{ u.username }}" {% if u.username == asset.assigned_to %}selected{% endif %}>{{ u.username }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select" required>
            <option value="Available">Available</option>
            <option value="In Use">In Use</option>
            <option value="Under Repair">Under Repair</option>
        </select>
    </div>

    <button type="submit" class="btn btn-warning">Transfer</button>
    <a href="{% url 'asset_list' %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
